name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: ''

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --windowed --icon=icon.ico --name proxy-to-codex main.py

      - name: Rename artifact with version
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            '${{ github.event.inputs.version }}'
          } else {
            '${{ github.ref_name }}'
          }
          $src = 'dist\proxy-to-codex.exe'
          $dst = "dist\proxy-to-codex_$tag.exe"
          Rename-Item -LiteralPath $src -NewName (Split-Path $dst -Leaf)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          files: dist/*.exe
          generate_release_notes: true
