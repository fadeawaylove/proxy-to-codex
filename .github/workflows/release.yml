name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: ''

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $ver = '${{ github.event.inputs.version }}'
          } else {
            $ver = '${{ github.ref_name }}'
          }
          if ($ver -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Version must match vX.Y.Z, got '$ver'"
          }
          Write-Host "Version: $ver"
          "ver=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Generate _version.py
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.ver }}' -replace '^v', ''
          Write-Host "Writing _version.py with version: $ver"
          "__version__ = ""$ver""" | Set-Content _version.py -Encoding utf8

      - name: Syntax check
        run: uv run python -m py_compile main.py server.py codex_config.py

      - name: Build executable
        run: uv run pyinstaller --clean --noconfirm proxy-to-codex.spec

      - name: Smoke test executable startup
        shell: pwsh
        run: |
          $exe = Resolve-Path "dist\proxy-to-codex.exe"
          $proc = Start-Process -FilePath $exe -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 5
          if ($proc.HasExited) {
            throw "Executable exited during startup smoke test with code $($proc.ExitCode)"
          }
          Stop-Process -Id $proc.Id -Force

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress --limit-output
          echo "$env:ProgramFiles\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build installer
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.ver }}' -replace '^v', ''
          Write-Host "Version for Inno Setup: $ver"
          iscc "/DMyAppVersion=$ver" scripts\setup.iss

      - name: Smoke test installed executable
        shell: pwsh
        run: |
          $installer = Resolve-Path "dist\*setup*.exe"
          $installDir = Join-Path $env:RUNNER_TEMP "proxy-to-codex-install"
          & $installer /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR="$installDir" /TASKS=""
          if ($LASTEXITCODE -ne 0) {
            throw "Installer exited with code $LASTEXITCODE"
          }
          $exe = Join-Path $installDir "proxy-to-codex.exe"
          if (-not (Test-Path $exe)) {
            throw "Installed executable not found at $exe"
          }
          $proc = Start-Process -FilePath $exe -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 5
          if ($proc.HasExited) {
            throw "Installed executable exited during startup smoke test with code $($proc.ExitCode)"
          }
          Stop-Process -Id $proc.Id -Force

      - name: Verify installer artifact
        shell: pwsh
        run: |
          $installers = Get-ChildItem dist\*setup*.exe
          if (-not $installers) {
            throw 'Installer artifact not found in dist/'
          }
          Write-Host "Installer built: $($installers[0].Name) ($('{0:N0}' -f $installers[0].Length) bytes)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          files: dist/*setup*.exe
          generate_release_notes: true
