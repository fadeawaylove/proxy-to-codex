name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: ''

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Build executable
        run: uv run pyinstaller --clean --noconfirm proxy-to-codex.spec

      - name: Smoke test executable
        shell: pwsh
        run: |
          $env:PROXY_TO_CODEX_SMOKE_TEST = '1'
          $env:APPDATA = Join-Path $env:RUNNER_TEMP 'proxy-to-codex-appdata'
          New-Item -ItemType Directory -Force -Path $env:APPDATA | Out-Null

          $exe = Resolve-Path 'dist\proxy-to-codex.exe'
          $process = Start-Process -FilePath $exe -PassThru
          if (-not $process.WaitForExit(30000)) {
            Stop-Process -Id $process.Id -Force
            throw 'Packaged executable smoke test timed out.'
          }
          if ($process.ExitCode -ne 0) {
            $logRoot = Join-Path $env:APPDATA 'proxy-to-codex\logs'
            if (Test-Path $logRoot) {
              Get-ChildItem $logRoot -File | ForEach-Object {
                Write-Host "===== $($_.FullName) ====="
                Get-Content $_.FullName -Tail 200
              }
            }
            throw "Packaged executable smoke test failed with exit code $($process.ExitCode)."
          }

      - name: Rename artifact with version
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            '${{ github.event.inputs.version }}'
          } else {
            '${{ github.ref_name }}'
          }
          $src = 'dist\proxy-to-codex.exe'
          $dst = "dist\proxy-to-codex_$tag.exe"
          Rename-Item -LiteralPath $src -NewName (Split-Path $dst -Leaf)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          files: dist/*.exe
          generate_release_notes: true
